name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pasang Tenun
        run: curl -fsSL https://raw.githubusercontent.com/TenunLang/Tenun/main/install.sh | bash
      - name: Validasi modul
        run: |
          mkdir -p proyek/tenun_modul/orm
          cp -r src tenun.json proyek/tenun_modul/orm/
          cd proyek
          "$HOME/.tenun/bin/tenun" add mysql
          "$HOME/.tenun/bin/tenun" add postgres
          printf 'impor "orm";\n' > cek.tenun
          "$HOME/.tenun/bin/tenun" run cek.tenun
          echo "modul orm valid (parse + pengecekan tipe lolos)"
